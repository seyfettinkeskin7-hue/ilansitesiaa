<!DOCTYPE html>
<html>
<head>
    <title>Hutbeler</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: linear-gradient(145deg,#e8edf2,#f0f4f8); min-height: 100vh; padding-bottom: 110px; }
        .header { background: rgba(255,255,255,0.6); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.8); padding: 12px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.04); }
        .geri { background: none; border: none; font-size: 22px; cursor: pointer; color: #555; text-decoration: none; }
        .header h1 { font-size: 18px; font-weight: 700; color: #222; display: flex; align-items: center; gap: 8px; }
        .icerik { max-width: 700px; margin: 0 auto; padding: 20px 16px; }
        .hutbe-grup { background: rgba(255,255,255,0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.85); border-radius: 18px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .hutbe-grup-baslik { padding: 14px 18px; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .hutbe-tarih { font-size: 12px; color: #999; margin-bottom: 4px; }
        .hutbe-adi { font-size: 16px; font-weight: 700; color: #222; }
        .pdf-satir { display: flex; align-items: center; gap: 14px; padding: 14px 18px; text-decoration: none; color: #333; transition: background 0.2s; }
        .pdf-satir:first-of-type { border-bottom: 1px solid rgba(0,0,0,0.05); }
        .pdf-satir:hover { background: rgba(255,96,0,0.04); }
        .pdf-ikon { width: 40px; height: 50px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .pdf-ikon.normal { background: #fff3ec; border: 1px solid #ffd0b3; }
        .pdf-ikon.telefon { background: #f0f5ff; border: 1px solid #b3caff; }
        .pdf-ikon svg { width: 20px; height: 20px; }
        .pdf-etiket { font-size: 8px; font-weight: 700; margin-top: 2px; letter-spacing: 0.05em; }
        .pdf-bilgi { flex: 1; }
        .pdf-tip { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 3px; }
        .pdf-aciklama { font-size: 12px; color: #999; }
        .indir { width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: center; }
        .indir svg { width: 16px; height: 16px; color: #888; }
        .bos { text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }
        .bos svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="geri">‹</a>
    <h1>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Cuma Hutbeleri
    </h1>
</div>

<div class="icerik">
    {% if hutbeler %}
        {% for hutbe in hutbeler %}
        <div class="hutbe-grup">
            <div class="hutbe-grup-baslik">
                <div class="hutbe-tarih">{{ hutbe.tarih|date:"d F Y" }} · Cuma</div>
                <div class="hutbe-adi">{{ hutbe.baslik }}</div>
            </div>
            <a href="{{ hutbe.normal_pdf.url }}" class="pdf-satir" target="_blank" download>
                <div class="pdf-ikon normal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FF6000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <div class="pdf-etiket" style="color:#FF6000;">PDF</div>
                </div>
                <div class="pdf-bilgi">
                    <div class="pdf-tip">Normal Hutbe</div>
                    <div class="pdf-aciklama">Standart baskı formatı · A4</div>
                </div>
                <div class="indir">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </div>
            </a>
            <a href="{{ hutbe.telefon_pdf.url }}" class="pdf-satir" target="_blank" download>
                <div class="pdf-ikon telefon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#4466dd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                    <div class="pdf-etiket" style="color:#4466dd;">PDF</div>
                </div>
                <div class="pdf-bilgi">
                    <div class="pdf-tip">Telefondan Hutbe</div>
                    <div class="pdf-aciklama">Mobil okuma formatı · Büyük yazı</div>
                </div>
                <div class="indir">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </div>
            </a>
        </div>
        {% endfor %}
    {% else %}
        <div class="bos">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <p>Henüz hutbe eklenmemiş.</p>
        </div>
    {% endif %}
</div>
</body>
</html>
