<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akademi Merkezleri - Dingönüllüleri</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        
        .header { background: white; padding: 12px 30px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-icon { background: #FF6000; color: white; padding: 8px; border-radius: 8px; font-size: 20px; }
        .logo-text { font-size: 20px; font-weight: bold; color: #333; }
        .header-sag { margin-left: auto; }
        .header-sag a { color: #555; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .ust-kontrol { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .sayfa-baslik { font-size: 26px; font-weight: bold; color: #333; }
        
        #geri-btn { 
            display: none; background: #333; color: white; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold;
        }
        #geri-btn:hover { background: #FF6000; }

        /* Ana kategoriler için yan yana iki büyük kart tasarımı */
        .grid-kategori { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        /* İçeri girildiğinde merkezleri listelemek için daha küçük kartlar */
        .grid-merkez { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        
        .kart { 
            background: white; border: 1px solid #ddd; border-radius: 10px; padding: 30px 20px; 
            text-align: center; cursor: pointer; transition: all 0.2s ease; text-decoration: none; color: #333;
        }
        .kart:hover { border-color: #FF6000; transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .kategori-isim { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .ikon { font-size: 45px; margin-bottom: 15px; }
        
        .akademi-kart { padding: 25px 15px; }
        .akademi-kart h3 { font-size: 16px; margin-bottom: 15px; line-height: 1.4; color: #333; }
        .resmi-link-yazi { display: inline-block; background: #FF6000; color: white; padding: 8px 16px; border-radius: 5px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-icon">🕌</div>
        <div class="logo-text">Dingönüllüleri</div>
        <div class="header-sag"><a href="/">← Anasayfa</a></div>
    </div>

    <div class="container">
        <div class="ust-kontrol">
            <h1 class="sayfa-baslik" id="sayfa-baslik">🎓 Akademi Merkezleri</h1>
            <button id="geri-btn" onclick="kategorileriGoster()">← Kategorilere Dön</button>
        </div>

        <div id="liste-alani"></div>
    </div>

    <script>
        // İki ana kategori ve içindeki merkezler (Resimdekileri örnek olarak ekledim, linkleri sonra düzeltiriz)
        const AKADEMI_VERISI = {
            "Dini İhtisas Merkezleri": [
                {"ad": "Ankara Rıfat Börekçi Dini İhtisas Merkezi", "url": "https://rifatborekci.diyanet.gov.tr/"},
                {"ad": "Antalya H. Mehmet Gebizli Dini İhtisas Merkezi", "url": "#"}
            ],
            "Dini Yüksek İhtisas Merkezleri": [
                {"ad": "Uluslararası İstanbul Haseki Dini Yüksek İhtisas Merkezi", "url": "https://haseki.diyanet.gov.tr/"}
            ]
        };

        const listeAlani = document.getElementById('liste-alani');
        const baslik = document.getElementById('sayfa-baslik');
        const geriBtn = document.getElementById('geri-btn');

        function kategorileriGoster() {
            listeAlani.innerHTML = ''; 
            listeAlani.className = 'grid-kategori'; // İki büyük kart görünümü
            baslik.innerText = '🎓 Akademi Merkezleri';
            geriBtn.style.display = 'none'; 

            for (const kategoriAdi in AKADEMI_VERISI) {
                const div = document.createElement('div');
                div.className = 'kart';
                div.innerHTML = `
                    <div class="ikon">🏛️</div>
                    <div class="kategori-isim">${kategoriAdi}</div>
                    <div style="font-size:15px; color:#888;">${AKADEMI_VERISI[kategoriAdi].length} Merkez Bulunuyor</div>
                `;
                
                div.onclick = function() {
                    merkezleriGoster(kategoriAdi);
                };
                
                listeAlani.appendChild(div);
            }
        }

        function merkezleriGoster(secilenKategori) {
            listeAlani.innerHTML = ''; 
            listeAlani.className = 'grid-merkez'; // Çoklu küçük kart görünümü
            baslik.innerText = `🏛️ ${secilenKategori}`;
            geriBtn.style.display = 'block'; 

            const merkezler = AKADEMI_VERISI[secilenKategori];

            merkezler.forEach(function(merkez) {
                const a = document.createElement('a');
                a.className = 'kart akademi-kart';
                a.href = merkez.url;
                a.target = '_blank'; 
                
                a.innerHTML = `
                    <div class="ikon">🎓</div>
                    <h3>${merkez.ad}</h3>
                    <span class="resmi-link-yazi">Resmi Sayfaya Git →</span>
                `;
                
                listeAlani.appendChild(a);
            });
        }

        // Sayfa yüklendiğinde ana kategorileri göster
        window.onload = kategorileriGoster;

    </script>
</body>
</html>
