<!DOCTYPE html>
<html>
<head>
    <title>Dingönüllüleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #07104a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; cursor: pointer; }

        :root {
          --navy: #0d1b6e; --navy-dark: #07104a; --navy-mid: #1a2a8a;
          --gold: #d4a843; --gold-light: #f0c96a; --gold-dim: #a07828;
          --cream: #f5e6c0; --sky: #c8d8f8;
        }

        #scene {
          position: relative; width: 900px; height: 500px; overflow: hidden;
          border-radius: 8px;
          background: linear-gradient(180deg, #0d1b6e 0%, #1a2a8a 40%, #0d1b6e 100%);
          box-shadow: 0 0 80px rgba(13,27,110,0.8);
        }
        #scene.exit {
          animation: slideOutLeft 1s cubic-bezier(0.7,0,1,0.5) forwards;
        }
        @keyframes slideOutLeft {
          from { transform: translateX(0); opacity: 1; }
          to   { transform: translateX(-110%); opacity: 0; }
        }

        .rays { position: absolute; inset: 0; opacity: 0; animation: raysIn 1.5s ease forwards 2s; }
        @keyframes raysIn { to { opacity: 1; } }
        .rays svg { width: 100%; height: 100%; }

        .cloud { position: absolute; opacity: 0; transform: translateY(60px); animation: cloudRise 1.2s ease forwards; }
        .cloud svg { filter: drop-shadow(0 4px 12px rgba(13,27,110,0.4)); }

        #mosque-wrap {
          position: absolute; bottom: 0; left: 50%;
          transform: translateX(-50%) translateY(100%);
          animation: mosqueRise 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
          width: 560px;
        }
        @keyframes mosqueRise { to { transform: translateX(-50%) translateY(0); } }

        .aura {
          position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
          width: 520px; height: 300px;
          background: radial-gradient(ellipse 80% 70% at 50% 80%, rgba(255,255,255,0.18) 0%, transparent 70%);
          pointer-events: none; opacity: 0; animation: auraIn 1s ease forwards 1.2s;
        }
        @keyframes auraIn { to { opacity: 1; } }

        #title-wrap {
          position: absolute; top: 0; left: 0; right: 0;
          display: flex; flex-direction: column; align-items: center; padding-top: 18px;
          transform: translateY(-100%); opacity: 0;
          animation: titleDrop 1s cubic-bezier(0.34,1.4,0.64,1) forwards 2.2s;
        }
        @keyframes titleDrop { to { transform: translateY(0); opacity: 1; } }

        .tc-text { font-family: 'Amiri', serif; font-size: 13px; letter-spacing: 7px; color: rgba(212,168,67,0.75); margin-bottom: 4px; }
        .main-title-text {
          font-family: 'Cinzel', serif; font-size: 28px; font-weight: 900;
          letter-spacing: 4px; color: var(--gold-light);
          text-shadow: 0 0 30px rgba(212,168,67,0.6), 0 2px 6px rgba(0,0,0,0.6);
          line-height: 1.2; text-align: center;
        }
        .main-title-text span { display: block; font-size: 20px; font-weight: 700; letter-spacing: 8px; color: var(--gold); margin-top: 2px; }

        .title-divider { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .tdiv-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .tdiv-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 6px rgba(212,168,67,0.7); }

        .lantern {
          position: absolute; top: 0; transform: translateY(-120px); opacity: 0;
          animation: lanternDrop 1s cubic-bezier(0.34,1.3,0.64,1) forwards;
          transform-origin: top center;
        }
        .lantern.swinging {
          animation: lanternDrop 1s cubic-bezier(0.34,1.3,0.64,1) forwards, swing 3s ease-in-out 1s infinite;
        }
        @keyframes lanternDrop { to { transform: translateY(0); opacity: 1; } }
        @keyframes swing { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

        .rope { position: absolute; top: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold-dim), transparent); opacity: 0; animation: ropeIn 0.8s ease forwards; }
        @keyframes ropeIn { to { opacity: 0.6; } }

        .corner-star { position: absolute; opacity: 0; animation: cstarIn 0.6s ease forwards; }
        @keyframes cstarIn { to { opacity: 1; } }

        #bottom-orn {
          position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
          opacity: 0; animation: fadeIn 0.8s ease forwards 3.2s;
          display: flex; align-items: center; gap: 8px;
        }
        .born-line { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,67,0.5), transparent); }
        .born-diamond { width: 5px; height: 5px; background: var(--gold-dim); transform: rotate(45deg); }

        .skip-hint {
          position: fixed; bottom: 20px; right: 24px;
          color: rgba(212,168,67,0.5); font-size: 12px;
          letter-spacing: 2px; font-family: Arial, sans-serif;
        }

        @keyframes fadeIn   { to { opacity: 1; } }
        @keyframes cloudRise { to { opacity: 0.9; transform: translateY(0); } }
    </style>
</head>

<style>
@keyframes slideInRight { from { opacity:0; transform: translateX(60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideInLeft  { from { opacity:0; transform: translateX(-60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideOutLeft  { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(-60px); } }
@keyframes slideOutRight { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(60px); } }
.page-slide-in-right { animation: slideInRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
.page-slide-in-left  { animation: slideInLeft  0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
</style>
<script>
(function(){
    var pages = ['/', '/ilanlar/', '/favoriler/', '/duyurular/'];
    var path = window.location.pathname;
    var currentIndex = pages.indexOf(path);
    if(currentIndex === -1) currentIndex = 0;

    // Aktif butonu işaretle
    var ids = ['nav-home','nav-ilanlar','nav-favoriler','nav-duyurular'];
    if(ids[currentIndex]) document.getElementById(ids[currentIndex]).classList.add('active');

    // Sayfa girişinde animasyon
    var dir = sessionStorage.getItem('navDir');
    if(dir === 'right') document.body.classList.add('page-slide-in-right');
    else if(dir === 'left') document.body.classList.add('page-slide-in-left');
    sessionStorage.removeItem('navDir');

    // Linklere tıklanınca yön belirle
    document.querySelectorAll('.bottom-nav a').forEach(function(a){
        a.addEventListener('click', function(e){
            var href = a.getAttribute('href');
            var targetIndex = pages.indexOf(href);
            if(targetIndex === -1) return;
            if(targetIndex === currentIndex) { e.preventDefault(); return; }
            sessionStorage.setItem('navDir', targetIndex > currentIndex ? 'right' : 'left');
        });
    });
})();
</script>

    slider.style.left=(3+i*bw)+'px';
    slider.style.width=bw+'px';
  }
  items[cur].classList.add('active');
  setTimeout(function(){moveSlider(cur);},50);
  window.addEventListener('resize',function(){moveSlider(cur);});
  items.forEach(function(item,i){
    item.addEventListener('click',function(e){
      if(i===cur)return;
      sessionStorage.setItem('navDir',i>cur?'right':'left');
    });
  });
  var dir=sessionStorage.getItem('navDir');
  if(dir){
    document.body.style.animation=dir==='right'?'bnavSlideR 0.32s ease':'bnavSlideL 0.32s ease';
    sessionStorage.removeItem('navDir');
  }
})();
</script>
<style>
@keyframes bnavSlideR{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes bnavSlideL{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
</style>
</body>
</html>
