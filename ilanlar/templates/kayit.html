<!DOCTYPE html>
<html>
<head>
    <title>Kayıt Ol</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        .header { background: #FF6000; padding: 15px; color: white; }
        .header h1 { margin: 0; font-size: 24px; }
        .form-kart { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; }
        .form-kart h2 { color: #FF6000; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #FF6000; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        a { color: #FF6000; }
        .hata { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 İlan Sitem</h1>
    </div>
    <div class="form-kart">
        <h2>Kayıt Ol</h2>
        {% if messages %}
            {% for message in messages %}
                <p class="hata">{{ message }}</p>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="kullanici_adi" placeholder="Kullanıcı Adı" required>
            <input type="email" name="email" placeholder="E-posta" required>
            <input type="password" name="sifre" placeholder="Şifre" required>
            <input type="password" name="sifre2" placeholder="Şifre Tekrar" required>
            <button type="submit">Kayıt Ol</button>
        </form>
        <p>Zaten hesabın var mı? <a href="/giris/">Giriş yap</a></p>
    </div>
</body>
</html>
