<!DOCTYPE html>
<html>
<head>
    <title>Kayıt Ol</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        .header { background: #FF6000; padding: 15px; color: white; }
        .header h1 { margin: 0; font-size: 24px; }
        .form-kart { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; }
        .form-kart h2 { color: #FF6000; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #FF6000; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        a { color: #FF6000; }
        .hata { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 İlan Sitem</h1>
    </div>
    <div class="form-kart">
        <h2>Kayıt Ol</h2>
        {% if messages %}
            {% for message in messages %}
                <p class="hata">{{ message }}</p>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="kullanici_adi" placeholder="Kullanıcı Adı" required>
            <input type="email" name="email" placeholder="E-posta" required>
            <input type="password" name="sifre" placeholder="Şifre" required>
            <input type="password" name="sifre2" placeholder="Şifre Tekrar" required>
            <button type="submit">Kayıt Ol</button>
        </form>
        <p>Zaten hesabın var mı? <a href="/giris/">Giriş yap</a></p>
    </div>




<style>
@keyframes slideInRight { from { opacity:0; transform: translateX(60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideInLeft  { from { opacity:0; transform: translateX(-60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideOutLeft  { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(-60px); } }
@keyframes slideOutRight { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(60px); } }
.page-slide-in-right { animation: slideInRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
.page-slide-in-left  { animation: slideInLeft  0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
</style>
<script>
(function(){
    var pages = ['/', '/ilanlar/', '/favoriler/', '/duyurular/'];
    var path = window.location.pathname;
    var currentIndex = pages.indexOf(path);
    if(currentIndex === -1) currentIndex = 0;

    // Aktif butonu işaretle
    var ids = ['nav-home','nav-ilanlar','nav-favoriler','nav-duyurular'];
    if(ids[currentIndex]) document.getElementById(ids[currentIndex]).classList.add('active');

    // Sayfa girişinde animasyon
    var dir = sessionStorage.getItem('navDir');
    if(dir === 'right') document.body.classList.add('page-slide-in-right');
    else if(dir === 'left') document.body.classList.add('page-slide-in-left');
    sessionStorage.removeItem('navDir');

    // Linklere tıklanınca yön belirle
    document.querySelectorAll('.bottom-nav a').forEach(function(a){
        a.addEventListener('click', function(e){
            var href = a.getAttribute('href');
            var targetIndex = pages.indexOf(href);
            if(targetIndex === -1) return;
            if(targetIndex === currentIndex) { e.preventDefault(); return; }
            sessionStorage.setItem('navDir', targetIndex > currentIndex ? 'right' : 'left');
        });
    });
})();
</script>
<!-- BOTTOM NAV -->
<style>
body { padding-bottom: 100px; }
.bnav-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    padding: 8px 8px 26px 8px;
    background: rgba(255,255,255,0.01);
    backdrop-filter: blur(80px) saturate(300%) brightness(1.05);
    -webkit-backdrop-filter: blur(80px) saturate(300%) brightness(1.05);
    border-top: 0.5px solid rgba(255,255,255,0.08);
}
.bnav-inner {
    display: flex;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 3px;
    position: relative;
}
.bnav-slider {
    position: absolute;
    top: 3px;
    bottom: 3px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    transition: left 0.35s cubic-bezier(0.34,1.15,0.64,1), width 0.35s cubic-bezier(0.34,1.15,0.64,1);
    pointer-events: none;
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.3);
}
.bnav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 58px;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    color: rgba(255,255,255,0.28);
    position: relative;
    z-index: 1;
    border-radius: 15px;
    transition: color 0.3s;
    text-decoration: none;
    user-select: none;
}
.bnav-item.active { color: rgba(255,255,255,0.95); }
.bnav-item svg { width: 20px; height: 20px; }
</style>
<div class="bnav-wrap">
  <div class="bnav-inner" id="bnavInner">
    <div class="bnav-slider" id="bnavSlider"></div>
    <a href="/" class="bnav-item" id="bnav-0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Anasayfa
    </a>
    <a href="/ilanlar/" class="bnav-item" id="bnav-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      İlanlar
    </a>
    <a href="/favoriler/" class="bnav-item" id="bnav-2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorilerim
    </a>
    <a href="/duyurular/" class="bnav-item" id="bnav-3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Duyurular
    </a>
  </div>
</div>
<script>
(function(){
  var pages=['/','/ilanlar/','/favoriler/','/duyurular/'];
  var path=window.location.pathname;
  var cur=pages.indexOf(path);
  if(cur===-1)cur=0;
  var slider=document.getElementById('bnavSlider');
  var inner=document.getElementById('bnavInner');
  var items=document.querySelectorAll('.bnav-item');
  function moveSlider(i){
    var w=inner.offsetWidth-6;
    var bw=w/4;
    slider.style.left=(3+i*bw)+'px';
    slider.style.width=bw+'px';
  }
  items[cur].classList.add('active');
  setTimeout(function(){moveSlider(cur);},50);
  window.addEventListener('resize',function(){moveSlider(cur);});
  items.forEach(function(item,i){
    item.addEventListener('click',function(e){
      if(i===cur)return;
      sessionStorage.setItem('navDir',i>cur?'right':'left');
    });
  });
  var dir=sessionStorage.getItem('navDir');
  if(dir){
    document.body.style.animation=dir==='right'?'bnavSlideR 0.32s ease':'bnavSlideL 0.32s ease';
    sessionStorage.removeItem('navDir');
  }
})();
</script>
<style>
@keyframes bnavSlideR{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes bnavSlideL{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
</style>
</body>
</html>
