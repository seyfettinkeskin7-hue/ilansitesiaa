{% extends "base.html" %}
{% block content %}
<div class="icerik">
    <div class="breadcrumb">
        <a href="/">Anasayfa</a> › <a href="/muftulukler/">Müftülükler</a> › {{ il }}
    </div>
    <div class="il-baslik">🕌 {{ il }} Müftülükleri</div>
    <div class="il-alt">{{ il }} iline bağlı müftülük listesi</div>
    
    <div class="ilce-grid">
        {% for ilce in ilceler %}
        <a href="{{ ilce.url }}" target="_blank" class="ilce-kart">
            <h3>🕌 {{ ilce.ad }} Müftülüğü</h3>
            <p>Resmi Sayfaya Git →</p>
        </a>
        {% empty %}
        <p>Bu ile ait veri bulunamadı.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
