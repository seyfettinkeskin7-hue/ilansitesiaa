<!DOCTYPE html>
<html>
<head>
    <title>{{ il }} Müftülükleri</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .ilce-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .ilce-kart { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; text-decoration: none; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .ilce-kart:hover { border-color: #FF6000; }
        .btn { background: #FF6000; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .ust-kisim { display: flex; justify-content: space-between; max-width: 1200px; margin: 0 auto 20px; align-items: center; }
    </style>
</head>
<body>
    <div class="ust-kisim">
        <h1>🕌 {{ il }} Müftülükleri</h1>
        <a href="/muftulukler/" style="text-decoration:none; color:#555;">← Geri Dön</a>
    </div>
    <div class="ilce-grid">
        {% for ilce in ilceler %}
        <a href="{{ ilce.url }}" target="_blank" class="ilce-kart">
            <span>{{ ilce.ad }} Müftülüğü</span>
            <span class="btn">Resmi Sayfa →</span>
        </a>
        {% empty %}
        <p>Henüz veri girilmedi.</p>
        {% endfor %}
    </div>
</body>
</html>
