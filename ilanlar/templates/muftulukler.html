{% extends "base.html" %} {% block content %}
<div class="icerik">
    <div class="sayfa-baslik">🕌 İl Müftülükleri</div>
    <div class="arama-kutu">
        <span>🔍</span>
        <input type="text" id="aramaInput" placeholder="İl ara..." oninput="ilAra()">
    </div>
    <div class="il-grid" id="ilGrid">
        {% for il_adi in iller %}
        <a href="/muftulukler/{{ il_adi|lower }}/" class="il-kart" data-il="{{ il_adi|lower }}">
            <div class="il-ikon">🕌</div>
            <div class="il-isim">{{ il_adi }}</div>
        </a>
        {% endfor %}
    </div>
</div>

<script>
    function ilAra() {
        var aramaMetni = document.getElementById('aramaInput').value.toLowerCase();
        document.querySelectorAll('.il-kart').forEach(function(kart) {
            var ilAdi = kart.dataset.il;
            kart.style.display = ilAdi.includes(aramaMetni) ? 'block' : 'none';
        });
    }
</script>
{% endblock %}
