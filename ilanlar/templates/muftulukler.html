<!DOCTYPE html>
<html>
<head>
    <title>Müftülükler - Dingönüllüleri</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .il-kart { background: white; padding: 20px; text-align: center; border-radius: 10px; border: 1px solid #ddd; text-decoration: none; color: #333; font-weight: bold; }
        .il-kart:hover { border-color: #FF6000; color: #FF6000; }
        .baslik { text-align: center; margin-bottom: 30px; font-size: 24px; }
    </style>
</head>
<body>
    <h1 class="baslik">🕌 İl Müftülükleri</h1>
    <div class="grid">
        {% for il in iller %}
        <a href="/muftulukler/{{ il|lower|replace:'ı','i'|replace:'ç','c'|replace:'ö','o'|replace:'ü','u'|replace:'ş','s'|replace:'ğ','g' }}/" class="il-kart">
            {{ il }}
        </a>
        {% endfor %}
    </div>
</body>
</html>
