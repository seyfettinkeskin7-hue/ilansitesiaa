<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İl Müftülükleri - Dingönüllüleri</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .ust-kisim { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .baslik { color: #333; font-size: 28px; margin: 0; }
        .geri-don { color: #FF6000; text-decoration: none; font-weight: bold; font-size: 14px; }
        .geri-don:hover { text-decoration: underline; }
        
        .il-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .il-kart {
            background-color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border: 1px solid #ddd;
            transition: all 0.2s ease;
        }
        .il-kart:hover {
            border-color: #FF6000;
            color: #FF6000;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="ust-kisim">
            <h1 class="baslik">🕌 İl Müftülükleri</h1>
            <a href="/" class="geri-don">← Anasayfaya Dön</a>
        </div>

        <div class="il-grid">
            {% for il_adi in iller %}
            <a href="/muftulukler/{{ il_adi|lower|replace:'ı','i'|replace:'ğ','g'|replace:'ü','u'|replace:'ş','s'|replace:'ö','o'|replace:'ç','c' }}/" class="il-kart">
                {{ il_adi }}
            </a>
            {% endfor %}
        </div>
    </div>

</body>
</html>
