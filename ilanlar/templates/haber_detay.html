<!DOCTYPE html>
<html>
<head>
    <title>{{ haber.baslik }} - Dingönüllüleri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: linear-gradient(145deg,#e8edf2 0%,#f0f4f8 40%,#e6ecf2 100%); min-height: 100vh; padding-bottom: 110px; }
        .header { background: rgba(255,255,255,0.6); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.8); padding: 12px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.04); }
        .geri { font-size: 22px; text-decoration: none; color: #333; }
        .header-baslik { font-size: 16px; font-weight: 700; color: #222; }
        .icerik { max-width: 800px; margin: 0 auto; padding: 0 0 30px; }
        .haber-resim { width: 100%; height: 260px; object-fit: cover; }
        .haber-resim-yok { width: 100%; height: 260px; background: #1a3a5c; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 14px; }
        .haber-bilgi { padding: 20px 16px; }
        .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .etiket { background: #FF6000; color: white; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px; }
        .tarih { font-size: 12px; color: #999; }
        .baslik { font-size: 22px; font-weight: 700; color: #222; line-height: 1.4; margin-bottom: 16px; }
        .ozet { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); font-style: italic; }
        .icerik-metin { font-size: 15px; color: #333; line-height: 1.8; white-space: pre-wrap; }

        .bnav-wrap { position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; padding: 10px 12px 28px 12px; background: rgba(240,243,247,0.7); backdrop-filter: blur(40px) saturate(200%); border-top: 0.5px solid rgba(255,255,255,0.6); }
        .bnav-inner { display: flex; background: rgba(255,255,255,0.35); border: 0.5px solid rgba(255,255,255,0.7); border-radius: 20px; padding: 4px; position: relative; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
        .bnav-slider { position: absolute; top: 4px; bottom: 4px; border-radius: 16px; background: rgba(255,255,255,0.75); border: 0.5px solid rgba(255,255,255,0.95); transition: left 0.35s cubic-bezier(0.34,1.15,0.64,1), width 0.35s; pointer-events: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; height: 58px; font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.35); position: relative; z-index: 1; border-radius: 16px; text-decoration: none; }
        .bnav-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="geri">←</a>
    <div class="header-baslik">Haber</div>
</div>

<div class="icerik">
    {% if haber.resim %}
        <img class="haber-resim" src="{{ haber.resim.url }}" alt="{{ haber.baslik }}">
    {% else %}
        <div class="haber-resim-yok">Resim Yok</div>
    {% endif %}

    <div class="haber-bilgi">
        <div class="meta">
            <span class="etiket">{{ haber.etiket }}</span>
            <span class="tarih">{{ haber.tarih|date:"d F Y" }}</span>
        </div>
        <h1 class="baslik">{{ haber.baslik }}</h1>
        {% if haber.aciklama %}
            <p class="ozet">{{ haber.aciklama }}</p>
        {% endif %}
        {% if haber.icerik %}
            <div class="icerik-metin">{{ haber.icerik }}</div>
        {% endif %}
    </div>
</div>

<div class="bnav-wrap">
  <div class="bnav-inner" id="bnavInner">
    <div class="bnav-slider" id="bnavSlider"></div>
    <a href="/" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Anasayfa
    </a>
    <a href="/ilanlar/" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Lojmanlar
    </a>
    <a href="/favoriler/" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorilerim
    </a>
    <a href="https://www.diyanet.gov.tr/tr-tr/Haberler/Indeks/19" target="_blank" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Duyurular
    </a>
  </div>
</div>

<script>
(function(){
    var slider = document.getElementById('bnavSlider');
    var inner = document.getElementById('bnavInner');
    function moveSlider(i){ var w=inner.offsetWidth-8; var bw=w/4; slider.style.left=(4+i*bw)+'px'; slider.style.width=bw+'px'; }
    setTimeout(function(){ moveSlider(0); }, 50);
    window.addEventListener('resize', function(){ moveSlider(0); });
})();
</script>
</body>
</html>
