<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #FF6000; padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
        .header-ikon { font-size: 24px; }
        .header h1 { color: white; font-size: 20px; font-weight: bold; }
        .icerik { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
        .kart { background: white; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .kart-baslik { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 6px; }
        .kart-alt { font-size: 14px; color: #888; margin-bottom: 24px; }
        .form-grup { margin-bottom: 16px; }
        .form-grup label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-grup input { width: 100%; padding: 14px 16px; border: 1.5px solid #eee; border-radius: 10px; font-size: 16px; color: #333; outline: none; transition: border 0.2s; }
        .form-grup input:focus { border-color: #FF6000; }
        .btn { width: 100%; padding: 15px; background: #FF6000; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .btn:active { background: #e05500; }
        .alt-link { text-align: center; margin-top: 18px; font-size: 14px; color: #888; }
        .alt-link a { color: #FF6000; font-weight: 600; text-decoration: none; }
        .hata { background: #fff0f0; color: #c00; padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; border: 1px solid #fcc; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-ikon">🕌</span>
        <h1>Dingönüllüleri</h1>
    </div>
    <div class="icerik">
        <div class="kart">
            <div class="kart-baslik">Hoş Geldiniz</div>
            <div class="kart-alt">Devam etmek için giriş yapın</div>
            {% if messages %}
            {% for message in messages %}
            <div class="hata">{{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-grup">
                    <label>Kullanıcı Adı</label>
                    <input type="text" name="username" placeholder="Kullanıcı adınız" autocomplete="username">
                </div>
                <div class="form-grup">
                    <label>Şifre</label>
                    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Giriş Yap</button>
            </form>
            <div class="alt-link">Hesabın yok mu? <a href="/kayit/">Kayıt ol</a></div>
        </div>
    </div>
</body>
</html>
