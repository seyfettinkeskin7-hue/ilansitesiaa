<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        .header { background: #FF6000; padding: 15px; color: white; }
        .header h1 { margin: 0; font-size: 24px; }
        .form-kart { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; }
        .form-kart h2 { color: #FF6000; margin-top: 0; }
        label { font-size: 13px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #FF6000; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        a { color: #FF6000; }
        .hata { background: #fee; color: #c00; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🕌 Dingönüllüleri</h1>
    </div>
    <div class="form-kart">
        <h2>Giriş Yap</h2>
        {% if hata %}
        <div class="hata">{{ hata }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Kullanıcı Adı</label>
            <input type="text" name="username" placeholder="Kullanıcı adınız">
            <label>Şifre</label>
            <input type="password" name="password" placeholder="Şifreniz">
            <button type="submit">Giriş Yap</button>
        </form>
        <p style="margin-top:15px;">Hesabın yok mu? <a href="/kayit/">Kayıt ol</a></p>
    </div>


<!-- BOTTOM NAV -->
<style>
.bottom-nav {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #555;
    font-size: 10px;
    gap: 4px;
    width: 60px;
    height: 56px;
    border-radius: 18px;
    background: rgba(255,255,255,0.25);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: all 0.2s;
    font-weight: 500;
}
.bottom-nav a.active {
    background: rgba(255,96,0,0.15);
    border-color: rgba(255,96,0,0.4);
    color: #FF6000;
}
.bottom-nav a:hover {
    background: rgba(255,96,0,0.1);
    color: #FF6000;
    transform: scale(1.08);
}
.bottom-nav a svg {
    width: 24px;
    height: 24px;
}
body { padding-bottom: 100px; }
</style>
<nav class="bottom-nav">
    <a href="/" id="nav-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Anasayfa
    </a>
    <a href="/ilanlar/" id="nav-ilanlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        İlanlar
    </a>
    <a href="/favoriler/" id="nav-favoriler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Favorilerim
    </a>
    <a href="/duyurular/" id="nav-duyurular">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Duyurular
    </a>
</nav>
<style>
@keyframes slideInRight { from { opacity:0; transform: translateX(60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideInLeft  { from { opacity:0; transform: translateX(-60px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideOutLeft  { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(-60px); } }
@keyframes slideOutRight { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(60px); } }
.page-slide-in-right { animation: slideInRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
.page-slide-in-left  { animation: slideInLeft  0.32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
</style>
<script>
(function(){
    var pages = ['/', '/ilanlar/', '/favoriler/', '/duyurular/'];
    var path = window.location.pathname;
    var currentIndex = pages.indexOf(path);
    if(currentIndex === -1) currentIndex = 0;

    // Aktif butonu işaretle
    var ids = ['nav-home','nav-ilanlar','nav-favoriler','nav-duyurular'];
    if(ids[currentIndex]) document.getElementById(ids[currentIndex]).classList.add('active');

    // Sayfa girişinde animasyon
    var dir = sessionStorage.getItem('navDir');
    if(dir === 'right') document.body.classList.add('page-slide-in-right');
    else if(dir === 'left') document.body.classList.add('page-slide-in-left');
    sessionStorage.removeItem('navDir');

    // Linklere tıklanınca yön belirle
    document.querySelectorAll('.bottom-nav a').forEach(function(a){
        a.addEventListener('click', function(e){
            var href = a.getAttribute('href');
            var targetIndex = pages.indexOf(href);
            if(targetIndex === -1) return;
            if(targetIndex === currentIndex) { e.preventDefault(); return; }
            sessionStorage.setItem('navDir', targetIndex > currentIndex ? 'right' : 'left');
        });
    });
})();
</script>
</body>
</html>
