function dipGecmePuani(ara, hedef=70){
  if(ara===''||ara===null) return null;
  const a=Number(ara);
  const p=Math.ceil((hedef - a*0.3)/0.7);
  return Math.max(0, p>100 ? null : p);
}

function tumFinalleriDoldur(dk, tip){
  const hedef = (tip==='gec') ? 70 : 50;   // GEÇERİM → DNO 70 hedefi
  tumDersler(dk).forEach((d,i)=>{
    const key=dersKey(dk,d,i);
    if(!state[dk].secili[key]) return;
    const ara=state[dk].notlar[key]?.ara;
    if(ara===''||ara===null) return;
    let puan = dipGecmePuani(ara, hedef);
    if(puan===null) return;
    if(!state[dk].notlar[key]) state[dk].notlar[key]={};
    state[dk].notlar[key].donem = String(puan);
  });
  saveToStorage();
  refreshDonem(dk);
}

function tumFinalleriDoldurGlobal(tip){
  const aktif = aktifTab;
  if(aktif==='d1' || aktif==='d2'){
    tumFinalleriDoldur(aktif, tip);
  } else {
    alert("Lütfen önce 1. Dönem veya 2. Dönem sekmesine geçin!");
  }
}

/* Bütünleme kontrolü eklendi */
function getButunlemeDurumu(dk){
  const liste = tumDersler(dk);
  let kaldiSayisi = 0;
  const kaldiDersler = [];
  liste.forEach((d,i)=>{
    const key = dersKey(dk,d,i);
    if(!state[dk].secili[key]) return;
    const b = getBasari(state[dk].notlar[key]?.ara, state[dk].notlar[key]?.donem);
    if(b !== null && b < 60){
      kaldiSayisi++;
      kaldiDersler.push(d.ad);
    }
  });
  return {kaldiSayisi, kaldiDersler};
}
