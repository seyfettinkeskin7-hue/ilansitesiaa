<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diyanet Akademisi Not Hesaplama</title>
<style>
:root{--color-background-primary:#ffffff;--color-background-secondary:#f5f5f5;--color-background-info:#e8f4fd;--color-background-success:#e8f5e9;--color-background-warning:#fff8e1;--color-background-danger:#fdecea;--color-border-tertiary:#e0e0e0;--color-border-secondary:#bdbdbd;--color-border-info:#90caf9;--color-border-success:#a5d6a7;--color-border-warning:#ffe082;--color-border-danger:#ef9a9a;--color-text-primary:#212121;--color-text-secondary:#616161;--color-text-tertiary:#9e9e9e;--color-text-info:#1565c0;--color-text-success:#2e7d32;--color-text-warning:#e65100;--color-text-danger:#c62828;--border-radius-md:8px;--border-radius-lg:12px;}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0f0;color:var(--color-text-primary);margin:0;padding:0;padding-bottom:80px;}
.header{background:white;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.logo-icon{background:#FF6000;color:white;padding:7px;border-radius:8px;font-size:18px;}
.logo-text{font-size:17px;font-weight:bold;color:#333;}
.header-sag{margin-left:auto;}
.header-sag a{color:#555;text-decoration:none;font-size:13px;font-weight:bold;}
.ust-bar{background:#1a8a8a;padding:12px 16px;}
.ust-bar a{color:white;text-decoration:none;font-size:14px;}
.container{max-width:900px;margin:20px auto;padding:0 12px;}
.card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:16px;}
.tab-btn{transition:all .15s;border:1px solid var(--color-border-tertiary);background:var(--color-background-primary);border-radius:6px;cursor:pointer;font-size:13px;padding:6px 14px;}
.tab-btn:hover{background:var(--color-background-secondary);}
input[type=number]{width:100%;box-sizing:border-box;font-size:12px;padding:4px 5px;border:1px solid var(--color-border-secondary);border-radius:4px;}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;}
button{border:1px solid var(--color-border-secondary);border-radius:6px;cursor:pointer;background:var(--color-background-primary);padding:6px 12px;}
.ders-row td{padding:6px 7px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;}
.tahmin-popup{display:none;position:absolute;z-index:10;min-width:220px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:.75rem 1rem;left:0;top:110%;}
.tahmin-wrap{position:relative;display:inline-block;}
.tahmin-wrap.open .tahmin-popup{display:block;}
table{width:100%;border-collapse:collapse;}
.tbl-wrap{overflow-x:auto;}
@media(max-width:600px){.ders-row td{font-size:11px;padding:4px 4px;}.tab-btn{font-size:12px;padding:5px 10px;}}
</style>
</head>
<body>
<div class="header">
  <div class="logo-icon">🕌</div>
  <div class="logo-text">Dingönüllüleri</div>
  <div class="header-sag"><a href="/akademi/">← Akademi</a></div>
</div>
<div class="ust-bar">
  <a href="/">Anasayfa</a> &nbsp;›&nbsp; <a href="/akademi/">Akademi</a> &nbsp;›&nbsp; Not Hesaplama
</div>
<div class="container">
<div class="card">
<h2 style="color:#1a8a8a;margin:0 0 16px;font-size:18px;">📊 Diyanet Akademisi Not Hesaplama</h2>
<div style="display:flex;gap:6px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:.75rem;flex-wrap:wrap;">
  <button onclick="gotoTab('d1')" id="tab-d1" class="tab-btn">1. Dönem</button>
  <button onclick="gotoTab('d2')" id="tab-d2" class="tab-btn">2. Dönem</button>
  <button onclick="gotoTab('mez')" id="tab-mez" class="tab-btn">Mezuniyet Sınavı</button>
  <button onclick="gotoTab('ozet')" id="tab-ozet" class="tab-btn">Genel Özet</button>
</div>
<div id="panel-d1"></div>
<div id="panel-d2" style="display:none;"></div>
<div id="panel-mez" style="display:none;"></div>
<div id="panel-ozet" style="display:none;"></div>
</div>
</div>
<script>
const DERSLER=[{ad:"Tecvid Bilgisi",alan:"Kur'an-ı Kerim",donem:1,kredi:28},{ad:"Talim Uygulamaları",alan:"Kur'an-ı Kerim",donem:1,kredi:28},{ad:"Yüzüne Okuma I",alan:"Kur'an-ı Kerim",donem:1,kredi:112},{ad:"Ezbere Okuma I",alan:"Kur'an-ı Kerim",donem:1,kredi:56},{ad:"Kur'an-ı Kerim Meali I",alan:"Temel İslami İlimler",donem:1,kredi:28},{ad:"Akaid-Kelam I",alan:"Temel İslami İlimler",donem:1,kredi:28},{ad:"İslam İbadet ve Sosyal Hayat Fıkhı I",alan:"Temel İslami İlimler",donem:1,kredi:56},{ad:"Hadis I",alan:"Temel İslami İlimler",donem:1,kredi:28},{ad:"İmamlık-Müezzinlik Bilgi ve Becerisi I",alan:"Mesleki Bilgi ve Beceri",donem:1,kredi:28},{ad:"Dini Musiki I",alan:"Mesleki Bilgi ve Beceri",donem:1,kredi:28},{ad:"Uygulama/Staj I",alan:"Mesleki Bilgi ve Beceri",donem:1,kredi:28},{ad:"Devlet Teşkilatı ve Kamu Mevzuatı",alan:"Mevzuat",donem:1,kredi:28},{ad:"Kültürel Etkinlikler I",alan:"Kültürel Etkinlikler",donem:1,kredi:28},{ad:"Yüzüne Okuma II",alan:"Kur'an-ı Kerim",donem:2,kredi:84},{ad:"Ezbere Okuma II",alan:"Kur'an-ı Kerim",donem:2,kredi:56},{ad:"Kur'an-ı Kerim Meali II",alan:"Temel İslami İlimler",donem:2,kredi:28},{ad:"Akaid-Kelam II",alan:"Temel İslami İlimler",donem:2,kredi:28},{ad:"İslam İbadet ve Sosyal Hayat Fıkhı II",alan:"Temel İslami İlimler",donem:2,kredi:56},{ad:"Hadis II",alan:"Temel İslami İlimler",donem:2,kredi:28},{ad:"Davet ve Nebevi Metot",alan:"Din Hizmetleri",donem:2,kredi:28},{ad:"Manevi Danışmanlık ve Rehberlik",alan:"Din Hizmetleri",donem:2,kredi:28},{ad:"İmamlık-Müezzinlik Bilgi ve Becerisi II",alan:"Mesleki Bilgi ve Beceri",donem:2,kredi:56},{ad:"Dini Musiki II",alan:"Mesleki Bilgi ve Beceri",donem:2,kredi:56},{ad:"Uygulama/Staj II",alan:"Mesleki Bilgi ve Beceri",donem:2,kredi:28},{ad:"Kültürel Etkinlikler II",alan:"Kültürel Etkinlikler",donem:2,kredi:28}];
const ALAN_BG={"Kur'an-ı Kerim":"var(--color-background-info)","Temel İslami İlimler":"var(--color-background-success)","Din Hizmetleri":"var(--color-background-warning)","Mesleki Bilgi ve Beceri":"var(--color-background-danger)","Mevzuat":"var(--color-background-secondary)","Kültürel Etkinlikler":"var(--color-background-secondary)"};
const ALAN_TX={"Kur'an-ı Kerim":"var(--color-text-info)","Temel İslami İlimler":"var(--color-text-success)","Din Hizmetleri":"var(--color-text-warning)","Mesleki Bilgi ve Beceri":"var(--color-text-danger)","Mevzuat":"var(--color-text-secondary)","Kültürel Etkinlikler":"var(--color-text-secondary)"};
let state={d1:{secili:{},notlar:{}},d2:{secili:{},notlar:{}},d1kayit:null,d2kayit:null,mezNot:''};
function saveToStorage(){try{localStorage.setItem('akademi_v3',JSON.stringify(state));}catch(e){}}
function loadFromStorage(){try{const r=localStorage.getItem('akademi_v3');if(r)state=JSON.parse(r);}catch(e){}}
function getBasari(ara,dsonu){if(ara===''||ara===undefined||dsonu===''||dsonu===undefined)return null;return Math.round(Number(ara)*0.3+Number(dsonu)*0.7);}
function getDurum(b){if(b===null)return null;if(b>=60)return 'gecti';if(b>=50)return 'kritik';return 'kaldi';}
function durumBadge(b){const d=getDurum(b);if(d===null)return '—';if(d==='gecti')return `<span class="badge" style="background:var(--color-background-success);color:var(--color-text-success);">✓ Geçti</span>`;if(d==='kritik')return `<span class="badge" style="background:var(--color-background-warning);color:var(--color-text-warning);">⚠ Kritik</span>`;return `<span class="badge" style="background:var(--color-background-danger);color:var(--color-text-danger);">✕ Kaldı</span>`;}
function satirBg(b){const d=getDurum(b);if(d==='kritik')return 'var(--color-background-warning)';if(d==='kaldi')return 'var(--color-background-danger)';return '';}
function tahminHesapla(ara){if(ara===''||ara===undefined)return null;const a=Number(ara);if(isNaN(a)||a<0||a>100)return null;const gecmePuani=Math.ceil((60-a*0.3)/0.7);const kalirsa=gecmePuani-1;const kalmaBasari=kalirsa>=0?Math.round(a*0.3+kalirsa*0.7):null;return{araPuan:a,gecmePuani:gecmePuani>100?null:gecmePuani<0?0:gecmePuani,gecmePuaniMumkun:gecmePuani<=100,kalirsa:kalirsa,kalmaBasari:kalmaBasari};}
function toggleSecili(dk,idx,val){state[dk].secili[idx]=val;if(!val)delete state[dk].notlar[idx];saveToStorage();refreshDonem(dk);}
function setNot(dk,idx,alan,val){if(!state[dk].notlar[idx])state[dk].notlar[idx]={};state[dk].notlar[idx][alan]=val;saveToStorage();refreshDonem(dk);}
function tumunuSec(dk,val){const donemNo=dk==='d1'?1:2;DERSLER.forEach((d,i)=>{if(d.donem===donemNo)state[dk].secili[i]=val;});saveToStorage();refreshDonem(dk);}
function kaydet(dk){const oz=hesapOzet(dk);if(oz.sayi===0){alert('Önce en az bir dersin notlarını girin!');return;}state[dk+'kayit']={secili:{...state[dk].secili},notlar:JSON.parse(JSON.stringify(state[dk].notlar))};saveToStorage();refreshDonem(dk);if(aktifTab==='ozet')renderOzetPanel();}
function kayitSil(dk){state[dk+'kayit']=null;saveToStorage();refreshDonem(dk);if(aktifTab==='ozet')renderOzetPanel();}
function hesapOzet(dk){const veri=state[dk+'kayit']||state[dk];const liste=DERSLER.filter(d=>d.donem===(dk==='d1'?1:2));let toplam=0,sayi=0,basarili=0,kritik=0,basarisiz=0;liste.forEach(d=>{const idx=DERSLER.indexOf(d);if(!veri.secili[idx])return;const ara=veri.notlar[idx]?.ara,dsonu=veri.notlar[idx]?.donem;const b=getBasari(ara,dsonu);if(b===null)return;toplam+=b;sayi++;const dur=getDurum(b);if(dur==='gecti')basarili++;else if(dur==='kritik')kritik++;else basarisiz++;});return{toplam,sayi,basarili,kritik,basarisiz,dno:sayi>0?Math.round(toplam/sayi):null};}
function renderDonem(dk){const donemNo=dk==='d1'?1:2;const s=state[dk];const kayit=state[dk+'kayit'];const readonly=!!kayit;const liste=DERSLER.filter(d=>d.donem===donemNo);const oz=hesapOzet(dk);const dnoRenk=oz.dno===null?'var(--color-text-secondary)':oz.dno>=70?'var(--color-text-success)':oz.dno>=60?'var(--color-text-warning)':'var(--color-text-danger)';const seciliSayi=liste.filter(d=>s.secili[DERSLER.indexOf(d)]).length;let rows='';let prevAlan='';liste.forEach(d=>{const idx=DERSLER.indexOf(d);const secili=readonly?(kayit.secili[idx]||false):(s.secili[idx]||false);const notVeri=readonly?kayit.notlar[idx]:s.notlar[idx];const ara=notVeri?.ara??'',dsonu=notVeri?.donem??'';const b=secili?getBasari(ara,dsonu):null;const bg=secili?satirBg(b):'';const alanBadge=d.alan!==prevAlan?`<span class="badge" style="background:${ALAN_BG[d.alan]};color:${ALAN_TX[d.alan]};">${d.alan}</span>`:'';prevAlan=d.alan;const bRenk=b===null?'var(--color-text-secondary)':b>=60?'var(--color-text-success)':b>=50?'var(--color-text-warning)':'var(--color-text-danger)';let tahminButon='';if(secili&&!readonly&&ara!==''){const t=tahminHesapla(ara);if(t){const gecRenk=!t.gecmePuaniMumkun?'danger':t.gecmePuani<=70?'success':t.gecmePuani<=85?'warning':'danger';tahminButon=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;"><div class="tahmin-wrap" id="tw-gec-${idx}"><button onclick="toggleTahmin(event,'gec',${idx})" style="font-size:10px;padding:3px 7px;background:var(--color-background-${gecRenk});border-color:var(--color-border-${gecRenk});color:var(--color-text-${gecRenk});">${!t.gecmePuaniMumkun?'Geçmek imkansız':'Kaç alırsam geçerim?'}</button><div class="tahmin-popup" id="popup-gec-${idx}"><p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:0 0 .5rem;">Ara: ${ara} | Dönem sonu tahmini</p>${!t.gecmePuaniMumkun?`<div style="padding:.4rem;background:var(--color-background-danger);border-radius:4px;"><p style="font-size:12px;color:var(--color-text-danger);margin:0;font-weight:500;">100 alsan bile geçemezsin.</p><p style="font-size:11px;color:var(--color-text-danger);margin:4px 0 0;">En yüksek: ${Math.round(Number(ara)*0.3+100*0.7)}</p></div>`:`<div style="padding:.4rem;background:var(--color-background-${gecRenk});border-radius:4px;"><p style="font-size:12px;color:var(--color-text-${gecRenk});margin:0;font-weight:500;">En az <strong>${t.gecmePuani}</strong> almalısın</p></div>`}</div></div><div class="tahmin-wrap" id="tw-kal-${idx}"><button onclick="toggleTahmin(event,'kal',${idx})" style="font-size:10px;padding:3px 7px;background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger);">Kaç alırsam kalırım?</button><div class="tahmin-popup" id="popup-kal-${idx}"><p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:0 0 .5rem;">Ara: ${ara} | Kalma eşiği</p>${t.kalirsa<0?`<div style="padding:.4rem;background:var(--color-background-success);border-radius:4px;"><p style="font-size:12px;color:var(--color-text-success);margin:0;">0 alsan bile geçersin!</p></div>`:`<div style="padding:.4rem;background:var(--color-background-danger);border-radius:4px;"><p style="font-size:12px;color:var(--color-text-danger);margin:0;font-weight:500;"><strong>${t.kalirsa}</strong> ve altı alırsan kalırsın</p></div>`}</div></div></div>`;}}rows+=`<tr class="ders-row" style="background:${bg};opacity:${secili?1:0.4};"><td style="text-align:center;">${readonly?`<input type="checkbox" ${secili?'checked':''} disabled>`:`<input type="checkbox" ${secili?'checked':''} onchange="toggleSecili('${dk}',${idx},this.checked)">`}</td><td>${d.ad}${tahminButon}</td><td>${alanBadge}</td><td style="text-align:center;color:var(--color-text-secondary);">${d.kredi}s</td><td style="text-align:center;">${secili?(readonly?`<span style="font-size:13px;">${ara||'—'}</span>`:`<input type="number" min="0" max="100" value="${ara}" placeholder="0-100" oninput="setNot('${dk}',${idx},'ara',this.value)">`):'—'}</td><td style="text-align:center;">${secili?(readonly?`<span style="font-size:13px;">${dsonu||'—'}</span>`:`<input type="number" min="0" max="100" value="${dsonu}" placeholder="0-100" oninput="setNot('${dk}',${idx},'donem',this.value)">`):'—'}</td><td style="text-align:center;font-weight:500;font-size:13px;color:${bRenk};">${b!==null?b:'—'}</td><td style="text-align:center;">${b!==null?durumBadge(b):'—'}</td></tr>`;});const kayitAlani=!readonly?`<div style="margin-top:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><button onclick="kaydet('${dk}')" style="font-size:13px;padding:7px 16px;background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success);">💾 ${donemNo}. Dönemi Kaydet</button><span style="font-size:12px;color:var(--color-text-tertiary);">Kaydettikten sonra notlar kilitlenir.</span></div>`:`<div style="margin-top:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><span style="font-size:12px;padding:5px 12px;border-radius:6px;background:var(--color-background-success);color:var(--color-text-success);">✓ ${donemNo}. Dönem kaydedildi</span><button onclick="kayitSil('${dk}')" style="font-size:12px;padding:5px 12px;color:var(--color-text-danger);border-color:var(--color-border-danger);">Kaydı Sil</button></div>`;return`<div style="margin-bottom:.75rem;"><p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 .6rem;">${readonly?'Notlar kaydedildi.':'Dersleri seçin, ara sınav notunu girin.'}</p>${!readonly?`<div style="display:flex;gap:8px;margin-bottom:.6rem;flex-wrap:wrap;"><button onclick="tumunuSec('${dk}',true)" style="font-size:12px;padding:4px 10px;">Tümünü Seç</button><button onclick="tumunuSec('${dk}',false)" style="font-size:12px;padding:4px 10px;">Seçimi Temizle</button><span style="font-size:12px;color:var(--color-text-secondary);align-self:center;">${seciliSayi} ders seçili</span></div>`:''}</div><div class="tbl-wrap"><table style="font-size:12px;table-layout:fixed;"><thead><tr style="background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);"><th style="padding:8px;width:4%;text-align:center;font-weight:500;color:var(--color-text-secondary);">#</th><th style="padding:8px;width:30%;text-align:left;font-weight:500;color:var(--color-text-secondary);">Ders</th><th style="padding:8px;width:13%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Alan</th><th style="padding:8px;width:6%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Saat</th><th style="padding:8px;width:11%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Ara</th><th style="padding:8px;width:11%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Final</th><th style="padding:8px;width:8%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Başarı</th><th style="padding:8px;width:12%;text-align:center;font-weight:500;color:var(--color-text-secondary);">Durum</th></tr></thead><tbody>${rows}</tbody>${oz.sayi>0?`<tfoot><tr style="background:var(--color-background-secondary);border-top:1px solid var(--color-border-secondary);"><td colspan="6" style="padding:9px 12px;font-weight:500;font-size:13px;">Dönem Ortalaması (${oz.sayi} ders)</td><td style="padding:9px 8px;text-align:center;font-size:15px;font-weight:500;color:${dnoRenk};">${oz.dno}</td><td style="padding:9px 8px;text-align:center;font-size:12px;color:${dnoRenk};">${oz.dno>=70?'DNO ✓':oz.dno>=60?'Kritik':'Yetersiz'}</td></tr></tfoot>`:''}</table></div>${kayitAlani}<div style="margin-top:.75rem;padding:.55rem 1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);"><p style="font-size:11px;color:var(--color-text-tertiary);margin:0;">💡 Ara sınav notunu girin → tahmin butonları çıkar &nbsp;|&nbsp; ⚠ Kritik: 50-59 &nbsp;|&nbsp; DNO ≥70 zorunlu</p></div>`;}
function toggleTahmin(e,tip,idx){e.stopPropagation();const wrap=document.getElementById(`tw-${tip}-${idx}`);const isOpen=wrap.classList.contains('open');document.querySelectorAll('.tahmin-wrap').forEach(w=>w.classList.remove('open'));if(!isOpen)wrap.classList.add('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.tahmin-wrap')){document.querySelectorAll('.tahmin-wrap').forEach(w=>w.classList.remove('open'));}});
function renderMezPanel(){const oz1=state.d1kayit?hesapOzet('d1'):{dno:null};const oz2=state.d2kayit?hesapOzet('d2'):{dno:null};const gno1=oz1.dno,gno2=oz2.dno;const gnoBilgi=(gno1&&gno2)?Math.round((gno1+gno2)/2):(gno1||gno2||null);const mez=state.mezNot!==''?Number(state.mezNot):null;let basariPuani=null;if(gnoBilgi&&mez)basariPuani=Math.round(gnoBilgi*0.6+mez*0.4);document.getElementById('panel-mez').innerHTML=`<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 1rem;"><strong>Başarı = GNO × %60 + Mezuniyet × %40</strong><br>Mezuniyet sınavından en az 70 almak zorunludur.</p><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem;"><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">1. Dönem Ort.</p><p style="font-size:20px;font-weight:500;margin:0;">${gno1||'Kayıt yok'}</p></div><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">2. Dönem Ort.</p><p style="font-size:20px;font-weight:500;margin:0;">${gno2||'Kayıt yok'}</p></div><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">GNO</p><p style="font-size:20px;font-weight:500;margin:0;">${gnoBilgi||'—'}</p></div></div><div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;"><p style="font-size:13px;font-weight:500;margin:0 0 .75rem;">Mezuniyet sınavı notunuzu girin</p><div style="display:flex;align-items:center;gap:10px;"><input type="number" min="0" max="100" value="${state.mezNot}" placeholder="0—100" oninput="state.mezNot=this.value;saveToStorage();renderMezPanel();" style="width:120px;font-size:16px;padding:8px 10px;"><span style="font-size:13px;color:var(--color-text-secondary);">/ 100</span>${mez!==null?`<span class="badge" style="font-size:12px;padding:4px 10px;background:${mez>=70?'var(--color-background-success)':'var(--color-background-danger)'};color:${mez>=70?'var(--color-text-success)':'var(--color-text-danger)'};">${mez>=70?'Geçer':'Geçmez (min 70)'}</span>`:''}</div></div>${mez!==null&&mez<70?`<div style="margin-bottom:1rem;padding:.65rem 1rem;background:var(--color-background-danger);border-radius:var(--border-radius-md);"><p style="font-size:13px;color:var(--color-text-danger);margin:0;">70 altı → <strong>başarısız</strong> sayılırsınız.</p></div>`:''}${basariPuani!==null?`<div style="padding:1rem 1.25rem;background:${basariPuani>=70&&mez>=70?'var(--color-background-success)':'var(--color-background-danger)'};border-radius:var(--border-radius-lg);"><p style="font-size:12px;margin:0 0 4px;color:${basariPuani>=70&&mez>=70?'var(--color-text-success)':'var(--color-text-danger)'};">GNO(${gnoBilgi})×%60 + Mez(${mez})×%40</p><p style="font-size:32px;font-weight:500;margin:0;color:${basariPuani>=70&&mez>=70?'var(--color-text-success)':'var(--color-text-danger)'};">${basariPuani} <span style="font-size:14px;">${basariPuani>=70&&mez>=70?'— Diploma 🎓':'— Başarısız'}</span></p></div>`:''}${!gnoBilgi?`<p style="font-size:12px;color:var(--color-text-tertiary);margin-top:.75rem;">Dönem(ler)i kaydettikten sonra mezuniyet hesaplaması yapılabilir.</p>`:'`}`;}
function renderOzetPanel(){const oz1=state.d1kayit?hesapOzet('d1'):{dno:null,sayi:0,basarili:0,kritik:0,basarisiz:0};const oz2=state.d2kayit?hesapOzet('d2'):{dno:null,sayi:0,basarili:0,kritik:0,basarisiz:0};const mez=state.mezNot!==''?Number(state.mezNot):null;const gno1=oz1.dno,gno2=oz2.dno;const gno=(gno1&&gno2)?Math.round((gno1+gno2)/2):(gno1||gno2||null);const basariPuani=(gno&&mez)?Math.round(gno*0.6+mez*0.4):null;const tumBasarisiz=oz1.basarisiz+oz2.basarisiz;const satir=(label,val,renk)=>`<tr style="border-bottom:0.5px solid var(--color-border-tertiary);"><td style="padding:9px 12px;font-size:13px;color:var(--color-text-secondary);">${label}</td><td style="padding:9px 12px;font-size:14px;font-weight:500;text-align:right;color:${renk||'var(--color-text-primary)'};">${val}</td></tr>`;document.getElementById('panel-ozet').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.25rem;"><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">1. Dönem</p><p style="font-size:20px;font-weight:500;margin:0;color:${gno1?(gno1>=70?'var(--color-text-success)':'var(--color-text-danger)'):'var(--color-text-tertiary)'};">${gno1||'—'}</p></div><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">2. Dönem</p><p style="font-size:20px;font-weight:500;margin:0;color:${gno2?(gno2>=70?'var(--color-text-success)':'var(--color-text-danger)'):'var(--color-text-tertiary)'};">${gno2||'—'}</p></div><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">GNO</p><p style="font-size:20px;font-weight:500;margin:0;color:${gno?(gno>=70?'var(--color-text-success)':'var(--color-text-danger)'):'var(--color-text-tertiary)'};">${gno||'—'}</p></div><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem;"><p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;">Mezuniyet</p><p style="font-size:20px;font-weight:500;margin:0;color:${mez?(mez>=70?'var(--color-text-success)':'var(--color-text-danger)'):'var(--color-text-tertiary)'};">${mez||'—'}</p></div></div><div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem;"><table>${satir('Toplam başarılı ders',oz1.basarili+oz2.basarili,'var(--color-text-success)')}${satir('Toplam kritik (50-59)',oz1.kritik+oz2.kritik,oz1.kritik+oz2.kritik>0?'var(--color-text-warning)':'var(--color-text-secondary)')}${satir('Toplam başarısız',tumBasarisiz,tumBasarisiz>0?'var(--color-text-danger)':'var(--color-text-secondary)')}${satir('Bütünleme',tumBasarisiz===0?'Gerekmiyor':tumBasarisiz<=2?tumBasarisiz+' ders için hak var':'Hak yok (3+)',tumBasarisiz===0?'var(--color-text-success)':tumBasarisiz<=2?'var(--color-text-warning)':'var(--color-text-danger)')}</table></div>${basariPuani!==null?`<div style="padding:1rem 1.25rem;background:${basariPuani>=70&&mez>=70?'var(--color-background-success)':'var(--color-background-danger)'};border-radius:var(--border-radius-lg);"><p style="font-size:12px;margin:0 0 4px;color:${basariPuani>=70&&mez>=70?'var(--color-text-success)':'var(--color-text-danger)'};">Nihai = GNO(${gno})×%60 + Mez(${mez})×%40</p><p style="font-size:32px;font-weight:500;margin:0;color:${basariPuani>=70&&mez>=70?'var(--color-text-success)':'var(--color-text-danger)'};">${basariPuani} <span style="font-size:14px;">${basariPuani>=70&&mez>=70?'— Diploma 🎓':'— Başarısız'}</span></p></div>`:`<div style="padding:.75rem 1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);"><p style="font-size:13px;color:var(--color-text-tertiary);margin:0;">Her iki dönemi kaydedip mezuniyet notunu girin.</p></div>`}`;}
let aktifTab='d1';
function refreshDonem(dk){document.getElementById(dk==='d1'?'panel-d1':'panel-d2').innerHTML=renderDonem(dk);}
function gotoTab(tab){aktifTab=tab;['d1','d2','mez','ozet'].forEach(t=>{const btn=document.getElementById('tab-'+t);const panel=document.getElementById('panel-'+t);const aktif=t===tab;btn.style.background=aktif?'#1a8a8a':'';btn.style.borderColor=aktif?'#1a8a8a':'';btn.style.color=aktif?'white':'';panel.style.display=aktif?'':'none';});if(tab==='mez')renderMezPanel();if(tab==='ozet')renderOzetPanel();}
function init(){loadFromStorage();document.getElementById('panel-d1').innerHTML=renderDonem('d1');document.getElementById('panel-d2').innerHTML=renderDonem('d2');gotoTab('d1');}
init();
</script>
</body>
